<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#150a20"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="cyberLine1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#9333ea" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="cyberLine2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(147,51,234,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9333ea" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  
  <!-- Base background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Glow effects -->
  <ellipse cx="300" cy="200" rx="400" ry="300" fill="url(#glowPurple)"/>
  <ellipse cx="1600" cy="800" rx="400" ry="300" fill="url(#glowCyan)"/>
  <ellipse cx="960" cy="540" rx="300" ry="200" fill="url(#glowPurple)" opacity="0.5"/>
  
  <!-- Horizontal cyber lines -->
  <rect x="0" y="200" width="100%" height="1" fill="url(#cyberLine1)"/>
  <rect x="0" y="400" width="100%" height="1" fill="url(#cyberLine2)"/>
  <rect x="0" y="680" width="100%" height="1" fill="url(#cyberLine1)"/>
  <rect x="0" y="880" width="100%" height="1" fill="url(#cyberLine2)"/>
  
  <!-- Large "QS" watermark -->
  <g opacity="0.03" filter="url(#glow)">
    <text x="960" y="600" font-family="Arial Black, sans-serif" font-size="600" 
          fill="#9333ea" text-anchor="middle" dominant-baseline="middle">QS</text>
  </g>
  
  <!-- Floating data particles -->
  <g filter="url(#glow)">
    <circle cx="150" cy="150" r="3" fill="#06b6d4" opacity="0.6"/>
    <circle cx="1800" cy="100" r="4" fill="#9333ea" opacity="0.5"/>
    <circle cx="200" cy="900" r="3" fill="#ec4899" opacity="0.6"/>
    <circle cx="1700" cy="950" r="4" fill="#06b6d4" opacity="0.5"/>
    <circle cx="960" cy="100" r="3" fill="#9333ea" opacity="0.4"/>
    <circle cx="500" cy="500" r="2" fill="#06b6d4" opacity="0.5"/>
    <circle cx="1400" cy="400" r="2" fill="#ec4899" opacity="0.5"/>
    <circle cx="100" cy="600" r="3" fill="#9333ea" opacity="0.4"/>
    <circle cx="1850" cy="540" r="3" fill="#06b6d4" opacity="0.5"/>
  </g>
  
  <!-- Circuit-like decorations -->
  <g stroke="#9333ea" stroke-width="1" fill="none" opacity="0.1">
    <path d="M0 300 L100 300 L150 350 L300 350"/>
    <path d="M1920 700 L1820 700 L1770 650 L1620 650"/>
    <path d="M0 800 L50 800 L100 750 L200 750 L250 800 L350 800"/>
    <path d="M1920 200 L1870 200 L1820 250 L1720 250 L1670 200 L1570 200"/>
  </g>
  
  <!-- Corner decorations -->
  <g stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.2">
    <path d="M20 60 L20 20 L60 20"/>
    <path d="M1860 20 L1900 20 L1900 60"/>
    <path d="M20 1020 L20 1060 L60 1060"/>
    <path d="M1860 1060 L1900 1060 L1900 1020"/>
  </g>
</svg>