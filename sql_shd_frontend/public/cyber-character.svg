<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Falling/floating pose - figure in motion -->
  <g transform="rotate(-15 250 300)">
    <!-- Body base - jacket -->
    <path d="M200 200 
             Q180 220 170 280 
             L160 380 
             Q155 420 180 450 
             L200 460 
             L250 480 
             L300 460 
             L320 450 
             Q345 420 340 380 
             L330 280 
             Q320 220 300 200 
             Z" 
          fill="url(#bodyGrad)" stroke="#2a2a4a" stroke-width="2"/>
    
    <!-- Jacket cyber lines -->
    <path d="M180 250 L190 380" stroke="#06b6d4" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
    <path d="M320 250 L310 380" stroke="#9333ea" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
    <path d="M200 300 L300 300" stroke="#ec4899" stroke-width="1" opacity="0.4"/>
    <path d="M195 340 L305 340" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    
    <!-- Hood/head -->
    <ellipse cx="250" cy="150" rx="55" ry="65" fill="url(#bodyGrad)" stroke="#2a2a4a" stroke-width="2"/>
    <ellipse cx="250" cy="150" rx="45" ry="55" fill="#0a0a0f"/>
    
    <!-- Visor/face glow -->
    <path d="M210 140 Q250 155 290 140" stroke="url(#cyberGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>
    <ellipse cx="235" cy="145" rx="12" ry="6" fill="#06b6d4" opacity="0.8" filter="url(#glow)"/>
    <ellipse cx="265" cy="145" rx="12" ry="6" fill="#06b6d4" opacity="0.8" filter="url(#glow)"/>
    
    <!-- Left arm (reaching up) -->
    <path d="M170 220 
             Q130 180 100 120 
             L90 100" 
          stroke="url(#bodyGrad)" stroke-width="25" fill="none" stroke-linecap="round"/>
    <path d="M100 120 L90 100" stroke="#06b6d4" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
    
    <!-- Left hand with glowing fingers -->
    <g filter="url(#glow)">
      <line x1="90" y1="100" x2="80" y2="70" stroke="#9333ea" stroke-width="3"/>
      <line x1="90" y1="100" x2="95" y2="65" stroke="#06b6d4" stroke-width="3"/>
      <line x1="90" y1="100" x2="110" y2="72" stroke="#ec4899" stroke-width="3"/>
      <line x1="90" y1="100" x2="120" y2="85" stroke="#9333ea" stroke-width="3"/>
      <circle cx="80" cy="70" r="4" fill="#9333ea"/>
      <circle cx="95" cy="65" r="4" fill="#06b6d4"/>
      <circle cx="110" cy="72" r="4" fill="#ec4899"/>
      <circle cx="120" cy="85" r="4" fill="#9333ea"/>
    </g>
    
    <!-- Right arm (reaching out) -->
    <path d="M330 220 
             Q370 200 410 180 
             L430 170" 
          stroke="url(#bodyGrad)" stroke-width="25" fill="none" stroke-linecap="round"/>
    <path d="M410 180 L430 170" stroke="#ec4899" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
    
    <!-- Right hand -->
    <g filter="url(#glow)">
      <line x1="430" y1="170" x2="450" y2="150" stroke="#ec4899" stroke-width="3"/>
      <line x1="430" y1="170" x2="460" y2="165" stroke="#9333ea" stroke-width="3"/>
      <line x1="430" y1="170" x2="455" y2="185" stroke="#06b6d4" stroke-width="3"/>
      <circle cx="450" cy="150" r="4" fill="#ec4899"/>
      <circle cx="460" cy="165" r="4" fill="#9333ea"/>
      <circle cx="455" cy="185" r="4" fill="#06b6d4"/>
    </g>
    
    <!-- Left leg -->
    <path d="M200 460 
             Q180 500 150 560 
             L130 600" 
          stroke="url(#bodyGrad)" stroke-width="30" fill="none" stroke-linecap="round"/>
    <path d="M160 540 L130 600" stroke="#06b6d4" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
    
    <!-- Left boot -->
    <ellipse cx="130" cy="600" rx="25" ry="15" fill="#1a1a2e" stroke="#06b6d4" stroke-width="2"/>
    <path d="M110 595 L150 595" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
    
    <!-- Right leg (bent up) -->
    <path d="M300 460 
             Q340 480 370 440 
             L400 400" 
          stroke="url(#bodyGrad)" stroke-width="30" fill="none" stroke-linecap="round"/>
    <path d="M370 440 L400 400" stroke="#9333ea" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
    
    <!-- Right boot -->
    <ellipse cx="400" cy="395" rx="25" ry="15" transform="rotate(-45 400 395)" fill="#1a1a2e" stroke="#9333ea" stroke-width="2"/>
  </g>
  
  <!-- Floating pixel debris -->
  <g filter="url(#glow)">
    <!-- Pixels flying off -->
    <rect x="60" y="120" width="8" height="8" fill="#06b6d4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="440" y="160" width="6" height="6" fill="#9333ea" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="80" width="5" height="5" fill="#ec4899" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="180" width="4" height="4" fill="#06b6d4" opacity="0.5"/>
    <rect x="420" y="220" width="6" height="6" fill="#ec4899" opacity="0.6"/>
    <rect x="50" y="250" width="5" height="5" fill="#9333ea" opacity="0.5"/>
    <rect x="460" y="280" width="4" height="4" fill="#06b6d4" opacity="0.4"/>
    
    <!-- Data stream particles -->
    <circle cx="30" cy="150" r="3" fill="#06b6d4" opacity="0.7"/>
    <circle cx="470" cy="200" r="3" fill="#9333ea" opacity="0.6"/>
    <circle cx="45" cy="300" r="2" fill="#ec4899" opacity="0.5"/>
    <circle cx="455" cy="350" r="2" fill="#06b6d4" opacity="0.5"/>
  </g>
  
  <!-- Glitch lines -->
  <g opacity="0.3">
    <rect x="0" y="180" width="500" height="2" fill="url(#glowLine)"/>
    <rect x="0" y="350" width="500" height="1" fill="url(#glowLine)"/>
    <rect x="0" y="420" width="500" height="2" fill="url(#glowLine)"/>
  </g>
</svg>