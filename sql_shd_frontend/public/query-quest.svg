<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="#0a0a0f"/>
  
  <!-- Outer hexagon -->
  <path d="M64 8 L112 36 L112 92 L64 120 L16 92 L16 36 Z" 
        stroke="url(#cyberGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>
  
  <!-- Inner hexagon -->
  <path d="M64 24 L96 44 L96 84 L64 104 L32 84 L32 44 Z" 
        stroke="#06b6d4" stroke-width="2" fill="rgba(6,182,212,0.1)"/>
  
  <!-- Q letter stylized -->
  <circle cx="64" cy="58" r="20" stroke="#9333ea" stroke-width="3" fill="none"/>
  <line x1="74" y1="68" x2="88" y2="82" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Data dots -->
  <circle cx="64" cy="58" r="4" fill="#06b6d4"/>
  <circle cx="44" cy="58" r="2" fill="#9333ea"/>
  <circle cx="84" cy="58" r="2" fill="#ec4899"/>
  <circle cx="64" cy="38" r="2" fill="#9333ea"/>
  <circle cx="64" cy="78" r="2" fill="#ec4899"/>
</svg>