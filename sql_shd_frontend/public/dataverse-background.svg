<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050308"/>
      <stop offset="30%" style="stop-color:#0a0510"/>
      <stop offset="60%" style="stop-color:#1a0a15"/>
      <stop offset="100%" style="stop-color:#2d1520"/>
    </linearGradient>
    
    <radialGradient id="sunGlow" cx="50%" cy="65%" r="35%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8"/>
      <stop offset="20%" style="stop-color:#f59e0b;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#b8860b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#fbbf24;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#f59e0b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:0"/>
    </radialGradient>
    
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a10"/>
      <stop offset="100%" style="stop-color:#0a0508"/>
    </linearGradient>
    
    <linearGradient id="gridLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sky Background -->
  <rect width="100%" height="100%" fill="url(#skyGradient)"/>
  
  <!-- Stars -->
  <g fill="#fbbf24">
    <circle cx="100" cy="50" r="1.5" opacity="0.9"/>
    <circle cx="200" cy="120" r="1" opacity="0.6"/>
    <circle cx="350" cy="80" r="1.2" opacity="0.8"/>
    <circle cx="500" cy="150" r="0.8" opacity="0.5"/>
    <circle cx="650" cy="60" r="1.3" opacity="0.7"/>
    <circle cx="800" cy="100" r="1" opacity="0.9"/>
    <circle cx="950" cy="40" r="1.5" opacity="0.6"/>
    <circle cx="1100" cy="130" r="0.9" opacity="0.8"/>
    <circle cx="1250" cy="70" r="1.2" opacity="0.7"/>
    <circle cx="1400" cy="110" r="1" opacity="0.9"/>
    <circle cx="1550" cy="50" r="1.4" opacity="0.6"/>
    <circle cx="1700" cy="90" r="1.1" opacity="0.8"/>
    <circle cx="1850" cy="140" r="0.9" opacity="0.7"/>
    <circle cx="150" cy="200" r="1" opacity="0.5"/>
    <circle cx="400" cy="250" r="1.3" opacity="0.6"/>
    <circle cx="750" cy="220" r="0.8" opacity="0.7"/>
    <circle cx="1000" cy="180" r="1.1" opacity="0.8"/>
    <circle cx="1300" cy="240" r="1" opacity="0.5"/>
    <circle cx="1600" cy="200" r="1.2" opacity="0.6"/>
    <circle cx="1800" cy="260" r="0.9" opacity="0.7"/>
  </g>
  
  <!-- Sun/Moon Glow -->
  <ellipse cx="960" cy="700" rx="600" ry="400" fill="url(#sunGlow)"/>
  
  <!-- Sun/Moon Core -->
  <circle cx="960" cy="700" r="120" fill="url(#sunCore)" filter="url(#strongGlow)"/>
  
  <!-- Horizon Line -->
  <line x1="0" y1="700" x2="1920" y2="700" stroke="#fbbf24" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Ground/Floor -->
  <rect x="0" y="700" width="1920" height="380" fill="url(#groundGradient)"/>
  
  <!-- Perspective Grid - Vertical Lines from horizon -->
  <g stroke="#fbbf24" stroke-width="1" opacity="0.4" filter="url(#glow)">
    <line x1="960" y1="700" x2="-200" y2="1080"/>
    <line x1="960" y1="700" x2="100" y2="1080"/>
    <line x1="960" y1="700" x2="300" y2="1080"/>
    <line x1="960" y1="700" x2="500" y2="1080"/>
    <line x1="960" y1="700" x2="700" y2="1080"/>
    <line x1="960" y1="700" x2="850" y2="1080"/>
    <line x1="960" y1="700" x2="960" y2="1080"/>
    <line x1="960" y1="700" x2="1070" y2="1080"/>
    <line x1="960" y1="700" x2="1220" y2="1080"/>
    <line x1="960" y1="700" x2="1420" y2="1080"/>
    <line x1="960" y1="700" x2="1620" y2="1080"/>
    <line x1="960" y1="700" x2="1820" y2="1080"/>
    <line x1="960" y1="700" x2="2120" y2="1080"/>
  </g>
  
  <!-- Perspective Grid - Horizontal Lines -->
  <g stroke="#fbbf24" stroke-width="1" opacity="0.3">
    <line x1="300" y1="730" x2="1620" y2="730"/>
    <line x1="200" y1="770" x2="1720" y2="770"/>
    <line x1="100" y1="820" x2="1820" y2="820"/>
    <line x1="0" y1="880" x2="1920" y2="880"/>
    <line x1="0" y1="950" x2="1920" y2="950"/>
    <line x1="0" y1="1030" x2="1920" y2="1030"/>
  </g>
  
  <!-- Mountains/City Silhouette Left -->
  <polygon points="0,700 80,580 120,620 180,520 250,580 320,500 380,560 420,700" fill="#0a0508"/>
  <polygon points="0,700 50,620 100,660 150,580 200,640 250,700" fill="#050305"/>
  
  <!-- Mountains/City Silhouette Right -->
  <polygon points="1500,700 1560,600 1620,650 1700,540 1780,620 1850,560 1920,620 1920,700" fill="#0a0508"/>
  <polygon points="1600,700 1680,630 1740,680 1820,600 1880,660 1920,640 1920,700" fill="#050305"/>
  
  <!-- Floating Data Cubes/Structures Left -->
  <g filter="url(#glow)" opacity="0.7">
    <rect x="150" y="400" width="60" height="60" fill="none" stroke="#fbbf24" stroke-width="1.5" transform="rotate(15, 180, 430)"/>
    <rect x="160" y="410" width="40" height="40" fill="none" stroke="#f59e0b" stroke-width="1" transform="rotate(15, 180, 430)"/>
  </g>
  
  <g filter="url(#glow)" opacity="0.5">
    <rect x="250" y="300" width="40" height="40" fill="none" stroke="#fbbf24" stroke-width="1" transform="rotate(-10, 270, 320)"/>
  </g>
  
  <!-- Floating Data Cubes/Structures Right -->
  <g filter="url(#glow)" opacity="0.7">
    <rect x="1700" y="380" width="55" height="55" fill="none" stroke="#fbbf24" stroke-width="1.5" transform="rotate(-20, 1727, 407)"/>
    <rect x="1710" y="390" width="35" height="35" fill="none" stroke="#f59e0b" stroke-width="1" transform="rotate(-20, 1727, 407)"/>
  </g>
  
  <g filter="url(#glow)" opacity="0.5">
    <rect x="1600" y="280" width="35" height="35" fill="none" stroke="#fbbf24" stroke-width="1" transform="rotate(12, 1617, 297)"/>
  </g>
  
  <!-- Data Streams/Lines -->
  <g stroke="#fbbf24" stroke-width="2" filter="url(#glow)" opacity="0.6">
    <line x1="100" y1="0" x2="100" y2="350">
      <animate attributeName="y2" values="0;350;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="0" x2="300" y2="280">
      <animate attributeName="y2" values="0;280;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="1620" y1="0" x2="1620" y2="320">
      <animate attributeName="y2" values="0;320;0" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="1820" y1="0" x2="1820" y2="400">
      <animate attributeName="y2" values="0;400;0" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="4.5s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Floating Particles -->
  <g fill="#fbbf24" filter="url(#glow)">
    <circle cx="200" cy="350" r="3">
      <animate attributeName="cy" values="350;300;350" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="450" r="2">
      <animate attributeName="cy" values="450;380;450" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="400" r="3">
      <animate attributeName="cy" values="400;330;400" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1750" cy="320" r="2">
      <animate attributeName="cy" values="320;260;320" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Database Symbol in sky -->
  <g transform="translate(960, 300)" filter="url(#glow)" opacity="0.4">
    <ellipse cx="0" cy="-30" rx="80" ry="20" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="80" ry="20" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <ellipse cx="0" cy="30" rx="80" ry="20" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="-80" y1="-30" x2="-80" y2="30" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="80" y1="-30" x2="80" y2="30" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  
  <!-- Hexagonal data nodes -->
  <g filter="url(#glow)" opacity="0.5">
    <polygon points="120,500 140,488 160,500 160,524 140,536 120,524" fill="none" stroke="#fbbf24" stroke-width="1"/>
    <polygon points="1760,480 1780,468 1800,480 1800,504 1780,516 1760,504" fill="none" stroke="#fbbf24" stroke-width="1"/>
  </g>
  
  <!-- Connecting lines between elements -->
  <g stroke="#fbbf24" stroke-width="0.5" opacity="0.3">
    <line x1="140" y1="512" x2="200" y2="350"/>
    <line x1="200" y1="350" x2="270" y2="320"/>
    <line x1="1780" y1="492" x2="1750" y2="320"/>
    <line x1="1617" y1="297" x2="1700" y2="380"/>
  </g>
  
  <!-- Vignette -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.6"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#vignette)"/>
</svg>